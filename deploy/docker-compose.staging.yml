# ============================================================
# NX-LAM — full staging stack (Postgres + API + Web).
# Coolify can import this compose directly, or you can run it on any Docker host:
#   cp .env.staging.example .env.staging   # fill the secrets
#   docker compose -f deploy/docker-compose.staging.yml --env-file .env.staging up -d --build
# The web is the only published port; it proxies /api to the api service internally.
# ============================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-fleet_assets}
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fleet_assets}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fleet_assets}?schema=public
      APP_BASE_URL: ${WEB_PUBLIC_URL}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
      CORS_ORIGINS: ${WEB_PUBLIC_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@nx-lam.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-System Administrator}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-fleet-assets}
      R2_SIGNED_URL_TTL: ${R2_SIGNED_URL_TTL:-300}
      CDN_PUBLIC_BASE_URL: ${CDN_PUBLIC_BASE_URL:-}
      TAP_SECRET_KEY: ${TAP_SECRET_KEY:-}
      TAP_PUBLIC_KEY: ${TAP_PUBLIC_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-Fleet Assets <no-reply@example.com>}
      ALERTS_DIGEST_INTERVAL_MS: ${ALERTS_DIGEST_INTERVAL_MS:-86400000}
      ALERTS_DIGEST_TO: ${ALERTS_DIGEST_TO:-}
      SENTRY_DSN_API: ${SENTRY_DSN_API:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_UPSTREAM: http://api:3001
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  fleet_pg_data:
